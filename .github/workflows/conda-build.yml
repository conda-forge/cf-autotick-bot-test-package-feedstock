# This file was generated automatically from conda-smithy. To update this configuration,
# update the conda-forge.yml and/or the recipe/meta.yaml.
# -*- mode: yaml -*-

name: Build conda package
on:
  push:

  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  build:
    name: ${{ matrix.CONFIG }}
    runs-on: ${{ matrix.runs_on }}
    timeout-minutes: 360
    strategy:
      fail-fast: false
      max-parallel: 50
      matrix:
        include:
          - CONFIG: linux_64_python3.13.____cp313
            DOCKER_IMAGE: quay.io/condaforge/linux-anvil-x86_64:alma9
            STORE_BUILD_ARTIFACTS: False
            UPLOAD_PACKAGES: True
            build_workspace_dir: build_artifacts
            docker_run_args: 
            free_disk_space: skip
            os: ubuntu
            pagefile_size: 0
            runs_on: ['ubuntu-latest']
            tools_install_dir: ~/miniforge3
          - CONFIG: linux_aarch64_python3.13.____cp313
            DOCKER_IMAGE: quay.io/condaforge/linux-anvil-aarch64:alma9
            STORE_BUILD_ARTIFACTS: False
            UPLOAD_PACKAGES: True
            build_workspace_dir: build_artifacts
            docker_run_args: 
            free_disk_space: skip
            os: ubuntu
            pagefile_size: 0
            runs_on: ['ubuntu-24.04-arm']
            tools_install_dir: ~/miniforge3
          - CONFIG: osx_64_python3.13.____cp313
            STORE_BUILD_ARTIFACTS: False
            UPLOAD_PACKAGES: True
            build_workspace_dir: ~/miniforge3/conda-bld
            docker_run_args: 
            free_disk_space: skip
            os: macos
            pagefile_size: 0
            runs_on: ['macos-15-intel']
            tools_install_dir: ~/miniforge3
          - CONFIG: osx_arm64_python3.13.____cp313
            STORE_BUILD_ARTIFACTS: False
            UPLOAD_PACKAGES: True
            build_workspace_dir: ~/miniforge3/conda-bld
            docker_run_args: 
            free_disk_space: skip
            os: macos
            pagefile_size: 0
            runs_on: ['macos-15']
            tools_install_dir: ~/miniforge3
          - CONFIG: win_64_python3.13.____cp313
            STORE_BUILD_ARTIFACTS: False
            UPLOAD_PACKAGES: True
            build_workspace_dir: D:\\bld\\
            docker_run_args: 
            free_disk_space: skip
            os: windows
            pagefile_size: 0
            runs_on: ['windows-2022']
            tools_install_dir: D:\Miniforge
    steps:

    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Build on Linux
      id: build-linux
      if: matrix.os == 'ubuntu'
      env:
        CI: github_actions
        CONDA_BLD_PATH: ${{ matrix.build_workspace_dir }}
        CONDA_FORGE_DOCKER_RUN_ARGS: ${{ matrix.docker_run_args }}
        CONFIG: ${{ matrix.CONFIG }}
        MINIFORGE_HOME: ${{ matrix.tools_install_dir }}
        DOCKER_IMAGE: ${{ matrix.DOCKER_IMAGE }}
        UPLOAD_PACKAGES: ${{ matrix.UPLOAD_PACKAGES }}
        PAGEFILE_SIZE: ${{ matrix.pagefile_size }}
        GHA_RUNS_ON: ${{ join(matrix.runs_on, ' ') }}
        BINSTAR_TOKEN: ${{ secrets.BINSTAR_TOKEN }}
        FEEDSTOCK_TOKEN: ${{ secrets.FEEDSTOCK_TOKEN }}
        STAGING_BINSTAR_TOKEN: ${{ secrets.STAGING_BINSTAR_TOKEN }}
      shell: bash
      run: |
        if [[ "$(uname -m)" == "x86_64" ]]; then
          echo "::group::Configure binfmt_misc"
          docker run --rm --privileged multiarch/qemu-user-static:register --reset --credential yes
        fi
        export CONDA_BLD_PATH="${CONDA_BLD_PATH/#~/${HOME}}"
        export FEEDSTOCK_NAME="$(basename $GITHUB_REPOSITORY)"
        export GIT_BRANCH="$(basename $GITHUB_REF)"
        export MINIFORGE_HOME="${MINIFORGE_HOME/#~/${HOME}}"
        export flow_run_id="github_$GITHUB_RUN_ID"
        export remote_url="https://github.com/$GITHUB_REPOSITORY"
        export sha="$GITHUB_SHA"
        if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
          export IS_PR_BUILD="True"
        else
          export IS_PR_BUILD="False"
        fi
        echo "::endgroup::"
        if [[ ${PAGEFILE_SIZE} -gt 0 ]]; then
            echo "::group::Setting up swap file"
            .scripts/create_pagefile.sh "${PAGEFILE_SIZE}"
            echo "::endgroup::"
        fi
        ./.scripts/run_docker_build.sh

    - name: Build on macOS
      id: build-macos
      if: matrix.os == 'macos'
      env:
        CI: github_actions
        CONDA_BLD_PATH: ${{ matrix.build_workspace_dir }}
        CONFIG: ${{ matrix.CONFIG }}
        MINIFORGE_HOME: ${{ matrix.tools_install_dir }}
        UPLOAD_PACKAGES: ${{ matrix.UPLOAD_PACKAGES }}
        BINSTAR_TOKEN: ${{ secrets.BINSTAR_TOKEN }}
        FEEDSTOCK_TOKEN: ${{ secrets.FEEDSTOCK_TOKEN }}
        STAGING_BINSTAR_TOKEN: ${{ secrets.STAGING_BINSTAR_TOKEN }}
      shell: bash
      run: |
        export CONDA_BLD_PATH="${CONDA_BLD_PATH/#~/${HOME}}"
        export FEEDSTOCK_NAME="$(basename $GITHUB_REPOSITORY)"
        export GIT_BRANCH="$(basename $GITHUB_REF)"
        export MINIFORGE_HOME="${MINIFORGE_HOME/#~/${HOME}}"
        export flow_run_id="github_$GITHUB_RUN_ID"
        export remote_url="https://github.com/$GITHUB_REPOSITORY"
        export sha="$GITHUB_SHA"
        if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
          export IS_PR_BUILD="True"
        else
          export IS_PR_BUILD="False"
        fi
        ./.scripts/run_osx_build.sh

    # https://github.com/aktech/cirun-azure-resize-disk
    - name: Resize all partitions to maximum
      if: matrix.os == 'windows'
      shell: pwsh
      run: |
        Write-Output "=== RESIZING PARTITIONS ==="
        $disks = Get-Disk | Where-Object PartitionStyle -ne 'RAW'

        foreach ($disk in $disks) {
            $partitions = Get-Partition -DiskNumber $disk.Number
            foreach ($partition in $partitions) {
                try {
                    $size = Get-PartitionSupportedSize -DiskNumber $disk.Number -PartitionNumber $partition.PartitionNumber
                    if ($partition.Size -lt $size.SizeMax) {
                        Write-Output "Resizing Disk $($disk.Number) Partition $($partition.PartitionNumber) from $($partition.Size) to $($size.SizeMax)"
                        Resize-Partition -DiskNumber $disk.Number -PartitionNumber $partition.PartitionNumber -Size $size.SizeMax -Verbose
                    } else {
                        Write-Output "Disk $($disk.Number) Partition $($partition.PartitionNumber) already at max size ($($partition.Size))"
                    }
                } catch {
                    Write-Warning "Failed resizing Disk $($disk.Number) Partition $($partition.PartitionNumber): $_"
                }
            }
        }

    - name: Build on windows
      id: build-windows
      if: matrix.os == 'windows'
      shell: cmd
      run: |
        set "flow_run_id=github_%GITHUB_RUN_ID%"
        set "remote_url=https://github.com/%GITHUB_REPOSITORY%"
        set "sha=%GITHUB_SHA%"
        call ".scripts\create_pagefile.bat" %PAGEFILE_SIZE%
        call ".scripts\run_win_build.bat"
      env:
        CI: github_actions
        CONDA_BLD_PATH: ${{ matrix.build_workspace_dir }}
        CONFIG: ${{ matrix.CONFIG }}
        MINIFORGE_HOME: ${{ matrix.tools_install_dir }}
        PAGEFILE_SIZE: ${{ matrix.pagefile_size }}
        PYTHONUNBUFFERED: 1
        UPLOAD_PACKAGES: ${{ matrix.UPLOAD_PACKAGES }}
        BINSTAR_TOKEN: ${{ secrets.BINSTAR_TOKEN }}
        FEEDSTOCK_TOKEN: ${{ secrets.FEEDSTOCK_TOKEN }}
        STAGING_BINSTAR_TOKEN: ${{ secrets.STAGING_BINSTAR_TOKEN }}